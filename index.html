<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>

<header class="w-[80%] mx-auto">
    <h1 class="text-6xl font-bold text-green-500">Plant Tracker</h1>

    <div class="grid grid-cols-3 gap-8">
        <div class="bg-amber-200 p-4">
            <p>Total</p>
            <p id="total">0</p>
        </div>

        <div class="bg-green-200 p-4">
            <p>Thrive</p>
            <!-- 🔥 FIX: class → id -->
            <p id="thrivingCount">0</p>
        </div>

        <div class="bg-red-200 p-4">
            <p>Struggling</p>
            <p id="strugglingCount">0</p>
        </div>
    </div>
</header>

<hr class="my-5">

<main class="w-[80%] mx-auto">

    <div class="mb-6">
        <button onclick="toggleStyle('all-filter-btn')" id="all-filter-btn" class="bg-black text-white px-5 py-2">All</button>

        <!-- 🔥 FIX: spelling -->
        <button onclick="toggleStyle('thriving-filter-btn')" id="thriving-filter-btn" class="bg-gray-300 px-5 py-2">Thriving</button>

        <button onclick="toggleStyle('struggling-filter-btn')" id="struggling-filter-btn" class="bg-gray-300 px-5 py-2">Struggling</button>
    </div>

    <!-- ALL CARD -->
    <section id="allCards" class="space-y-6">

        <div class="card flex justify-between border p-8">
            <div class="space-y-6">
                <div>
                    <p class="plantName text-4xl">Plant 1</p>
                    <p class="latinName">Latin 1</p>
                </div>

                <div class="flex gap-2">
                    <p class="light bg-gray-200 px-5">Bright</p>
                    <p class="water bg-gray-200 px-5">Weekly</p>
                </div>

                <p class="status">Good</p>
                <p class="notes">Nice growth</p>

                <div class="flex gap-5">
                    <button class="thriving-btn bg-green-200 px-4 py-2">Thrive</button>
                    <button class="struggling-btn bg-red-200 px-4 py-2">Struggle</button>
                </div>
            </div>
        </div>

    </section>

    <!-- 🔥 FIX: missing section -->
    <section id="filtered-section" class="space-y-6 hidden"></section>

</main>

<script src="script.js"></script>
</body>
</html>
