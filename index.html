<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="tailwind.init.css">
</head>
<body class="bg-slate-50 min-h-screen">

    <header class="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-2xl">Job Application Tracker</h1>
        <div class="avatar online placeholder">
           
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 lg:p-8">
        <section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="stat-card">
                <div class="stat-title">Total Applied</div>
                <div id="total-count" class="stat-value text-blue-700">0</div>
            </div>
            <div class="stat-card border-l-info">
                <div class="stat-title">Interview</div>
                <div id="interview-count" class="stat-value text-green-400">0</div>
            </div>
            <div class="stat-card border-l-error">
                <div class="stat-title">Rejected</div>
                <div id="rejected-count" class="stat-value text-orange-400">0</div>
            </div>
        </section>

        <section class="bg-white rounded-3xl shadow-sm p-6 lg:p-10 border border-gray-100">
            <div class="flex flex-col md:flex-row justify-between items-center mb-8">
                <h2 class="text-2xl font-bold text-slate-800">Available Jobs</h2>
                <div class="badge badge-lg bg-slate-100 border-none font-bold">
                    <span id="section-count" class="ml-2 text-primary">0</span>
                </div>
            </div>

            <div role="tablist" class=" bg-slate-100">
                <button role="tab" id="tab-all" class="tab tab-active" onclick="switchTab('all')">All Jobs</button>
                <button role="tab" id="tab-interview" class="tab" onclick="switchTab('interview')">Interview</button>
                <button role="tab" id="tab-rejected" class="tab" onclick="switchTab('rejected')">Rejected</button>
            </div>

            <div id="job-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-1 gap-6">
                </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
